# cargo-deny policy: the tool sells privacy, so a vulnerable or unvetted
# dependency attacks the product's core value (ROADMAP P0 #6).

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    # icu_* / zerovec family pulled in transitively by ureq's rustls stack.
    "Unicode-3.0",
    # ring's LICENSE mixes ISC-style and OpenSSL-derived text.
    "OpenSSL",
    "CDLA-Permissive-2.0",
]

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
